<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "微软雅黑", sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 550px;
        }
        h1 {
            font-size: 32px;
            color: #ff5a8c;
            margin-bottom: 20px;
        }
        p {
            font-size: 17px;
            line-height: 1.8;
            margin: 10px 0;
        }
        .heart {
            color: #ff5a8c;
            font-size: 22px;
        }
    </style>
</head>
<body>
<script>
// ———————— 这里设置密码 ————————
let password = "星图定则";
// ——————————————————————————————

let input = prompt("要不要输入一个密码呢，提示一下，是 “二十一世纪最伟大的心理学成就”");

if (input !== password) {
    alert("好吧，我猜到你猜不到了，密码是“星图xx”（最后两个字省略啦），只能重新来喽");
    document.write("<h1>内容已加密</h1>");
}
</script>

<div id="content" style="display:none">
<div class="box">
    <h1>致王莘逖</h1>
    <p>有趣嘛✨</p>
    <p>我觉得不是很无聊</p>
    <p>肚子疼，闲的没事捣鼓电脑</p>
    <p>疼不疼啊，好可怜，应该很绝望吧，抱抱你，嘻嘻，下次小心点吧，但是毕竟都要过去了，会没事的</p>
   <p>然后，李福子轩敬上 <span class="heart">❤️</span></p>
</div>
</div>

<script>
if (input === password) {
    document.getElementById("content").style.display = "block";
}
</script>
</body>
</html>
